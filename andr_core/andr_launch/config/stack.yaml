# stack.yaml — Full ANDR stack configuration
#
# Used by: ros2 launch andr_brain stack.launch.py
#          ros2 launch andr_brain stack.launch.py config:=/path/to/custom.yaml
#
# Each section can be toggled with `enabled: true/false`.
# Parameters under each node are passed as ROS 2 parameters.

# ─── Global settings ─────────────────────────────────────────────────────────
log_level: info

# ─── LLM configuration (shared by agent) ─────────────────────────────────────
llm:
  backend: ollama
  model: qwen2.5:3b
  host: http://localhost:11434
  temperature: 0.2

# ─── Memory configuration ────────────────────────────────────────────────────
#
# The memory_manager node manages named stores on disk.  Each store has its
# own backend, path, size limit, and eviction policy.  The agent discovers
# store_memory / query_memory tools via tool_manager automatically.
#
# on_full options:
#   reject  — refuse new entries when the store hits its size limit
#   evict   — delete oldest entries to make room (FIFO eviction)
#   warn    — log a warning but allow storage anyway
memory:
  default_store: default
  top_k: 4
  stores:
    default:
      backend: chroma
      path: ~/.andr/memory/default
      max_size_mb: 512
      embedding_model: all-MiniLM-L6-v2
      on_full: warn

# ─── Core infrastructure ─────────────────────────────────────────────────────
core:
  task_brain:
    enabled: true
    params:
      enable_wander: false         # Send idle prompts when no tasks pending
      wander_interval_sec: 60.0    # Seconds between wander prompts
      wander_prompt: ""            # Custom wander prompt (empty = rotate defaults)
      enable_scheduler: true       # Enable scheduled/cron tasks
      resume_preempted: true       # Resume interrupted tasks after preemption

  task_manager:
    enabled: true

  agent:
    enabled: true
    params:
      max_iterations: 20

  prompt_manager:
    enabled: true

  memory_manager:
    enabled: true

  tool_manager:
    enabled: true

  ui:
    enabled: true
    port: "8080"

# ─── Tools (each is a BaseAgentTool action server) ────────────────────────────
tools:
  speak:
    enabled: true
    package: andr_skills
    executable: speak_server

  walk:
    enabled: true
    package: andr_nav
    executable: walk_server

  spin:
    enabled: true
    package: andr_nav
    executable: spin_server

  navigate_to_point:
    enabled: true
    package: andr_nav
    executable: navigate_to_point_server

  map:
    enabled: true
    package: andr_nav
    executable: map_server

  gesture:
    enabled: true
    package: andr_skills
    executable: gesture_server

  store_memory:
    enabled: true
    package: agent
    executable: store_memory_server

  query_memory:
    enabled: true
    package: agent
    executable: query_memory_server

  vision:
    enabled: false                 # VLM tool — not ready yet
    package: andr_skills
    executable: vision_server
    params:
      vlm_backend: ollama
      vlm_model: llava
      vlm_host: http://localhost:11434

# ─── Input sources (each is a BaseInputSource bridge) ─────────────────────────
inputs:
  vision_bridge:
    enabled: false                 # VLM bridge — not ready yet
    package: andr_skills
    executable: vision_task_bridge
    params:
      scene_topic: /vision/scene
      cooldown_sec: 10.0
