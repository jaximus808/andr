# skill_executor_config.yaml
# Maps skill names to their backing ROS 2 action servers.
# All action servers use the ExecuteSkill action type (andr/action/ExecuteSkill).
#
# The skill_executor node loads this config and creates an action client
# for each entry at startup. When it receives an ExecuteSkill goal with
# a given skill_name, it forwards the goal to the matching action server.

skills:
  speak:
    action_server: /skills/speak
    description: "Text-to-speech via robot speaker"

  walk:
    action_server: /skills/walk
    description: "Walk forward/backward for a duration"

  spin:
    action_server: /skills/spin
    description: "Rotate the robot in place for a given duration"
