skills:

  # ── Perception ────────────────────────────────────────────────────────────
  - name: see
    description: >
      Point the camera at a given pan angle (yaw, degrees) and vertical tilt,
      then return a list of objects the ML detector recognises in that view.
      Use this to scan the environment before acting on objects.
    parameters:
      - name: pan_deg
        type: float
        required: false
        description: >
          Horizontal pan angle in degrees relative to robot forward (negative = left,
          positive = right). Defaults to 0 (straight ahead).
      - name: tilt_deg
        type: float
        required: false
        description: Vertical tilt in degrees (negative = down, positive = up). Defaults to 0.
      - name: fov_deg
        type: float
        required: false
        description: Horizontal field-of-view hint in degrees (10–120). Default 60.
    returns: json
    category: perception
    tags: [camera, vision, detection]

  # ── Navigation — landmark-based ───────────────────────────────────────────
  - name: move_to_landmark
    description: >
      Navigate the robot to a known named landmark (e.g. "kitchen", "charging_dock",
      "front_door"). SLAM + Nav2 handle path planning. Returns when the robot
      arrives or when navigation fails.
    parameters:
      - name: landmark
        type: string
        required: true
        description: >
          Name of the destination landmark exactly as it appears in the map
          (e.g. "kitchen", "living_room", "charging_dock").
      - name: approach_distance_m
        type: float
        required: false
        description: Stop this many metres short of the landmark centre. Default 0.3.
    returns: json
    category: navigation
    tags: [nav2, slam, move]

  # ── Navigation — directional sequence ────────────────────────────────────
  - name: move_sequence
    description: >
      Execute an ordered list of low-level motion primitives: forward/back in
      metres, turn left/right in degrees, or pause in seconds. Useful for precise
      short-range manoeuvres where landmark navigation is overkill.
    parameters:
      - name: steps
        type: array
        required: true
        description: >
          Ordered list of motion step objects. Each step has:
            type  — one of "forward", "backward", "turn_left", "turn_right", "pause"
            value — distance in metres (forward/backward), degrees (turn), or
                    seconds (pause). Example:
            [{"type":"forward","value":1.5},
             {"type":"turn_right","value":90},
             {"type":"forward","value":0.5}]
    returns: json
    category: navigation
    tags: [motion, primitive, directional]

  # ── Speech ────────────────────────────────────────────────────────────────
  - name: speak
    description: >
      Synthesise the given sentence with TTS and play it through the robot's
      speaker. Returns when audio playback finishes.
    parameters:
      - name: text
        type: string
        required: true
        description: The sentence or phrase to speak (max ~300 characters).
      - name: voice
        type: string
        required: false
        description: TTS voice name or style hint (e.g. "calm", "cheerful"). Default "default".
    returns: json
    category: communication
    tags: [tts, speech, audio]

  # ── Spin ─────────────────────────────────────────────────────────────
  - name: spin
    description: >
      Rotate the robot in place for a given duration. Useful for scanning the
      surroundings, performing a celebratory twirl, or turning to face a new
      direction. The robot spins at a configurable speed and stops automatically
      when the duration elapses.
    parameters:
      - name: duration_s
        type: float
        required: true
        description: >
          How long to spin in seconds (e.g. 3.0 for a roughly full rotation
          at default speed).
      - name: speed_deg_s
        type: float
        required: false
        description: Rotation speed in degrees per second. Default 90 (one full turn in ~4 s).
      - name: direction
        type: string
        required: false
        description: >
          Spin direction: "left" (counter-clockwise) or "right" (clockwise).
          Default "left".
    returns: json
    category: navigation
    tags: [rotation, spin, cmd_vel]

  # ── Animation ─────────────────────────────────────────────────────────────
  - name: animate
    description: >
      Play a named robot body animation (head nod, wave, idle look-around, etc.).
      Animations are pre-authored clips stored on the robot. Returns when the
      animation finishes or is interrupted.
    parameters:
      - name: animation_name
        type: string
        required: true
        description: >
          Animation clip name. Known clips: "nod", "wave", "look_around",
          "idle", "celebrate", "confused", "follow_me", "point_forward".
      - name: loop
        type: bool
        required: false
        description: If true, loop the animation until a stop command. Default false.
    returns: json
    category: expression
    tags: [animation, body, gesture]
