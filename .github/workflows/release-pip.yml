# Builds and publishes the andr pip package to PyPI.
#
# Triggered by pushing a tag like v0.1.0, v0.2.0, etc.
# Or manually via workflow_dispatch.
#
# Flow:
#   1. Spin up ROS 2 Humble container
#   2. Build andr_msgs + tool_manager with colcon
#   3. Sync compiled artifacts (bindings, .so libs, binary) into pip package
#   4. Build wheel (setuptools follows symlinks for Python source files)
#   5. Publish to PyPI

name: Release pip package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y python3-pip python3-colcon-common-extensions
          pip3 install build twine

      - name: Build andr_msgs + tool_manager
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --packages-select andr_msgs tool_manager
        shell: bash

      - name: Sync compiled artifacts into pip package
        run: |
          PY_VERSION=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          MSGS_SRC="install/andr_msgs/local/lib/python${PY_VERSION}/dist-packages/andr_msgs"
          LIBS_SRC="install/andr_msgs/lib"
          TM_BIN="install/tool_manager/lib/tool_manager/tool_manager_node"

          # Sync andr_msgs Python bindings
          rm -rf pip/andr/andr/_msgs_bind/andr_msgs
          mkdir -p pip/andr/andr/_msgs_bind/andr_msgs
          cp -r ${MSGS_SRC}/* pip/andr/andr/_msgs_bind/andr_msgs/
          touch pip/andr/andr/_msgs_bind/__init__.py

          # Sync shared libraries
          rm -f pip/andr/andr/_libs/*.so
          mkdir -p pip/andr/andr/_libs
          cp ${LIBS_SRC}/libandr_msgs*.so pip/andr/andr/_libs/
          touch pip/andr/andr/_libs/__init__.py

          # Sync tool_manager binary
          mkdir -p pip/andr/andr/bin
          cp ${TM_BIN} pip/andr/andr/bin/tool_manager_node
          chmod +x pip/andr/andr/bin/tool_manager_node
        shell: bash

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "__version__ = \"${VERSION}\"" > pip/andr/andr/_version.py
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pip/andr/pyproject.toml
        shell: bash

      - name: Build wheel
        run: |
          cd pip/andr
          python3 -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd pip/andr
          python3 -m twine upload dist/*
