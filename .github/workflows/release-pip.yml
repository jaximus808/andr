# Builds and publishes the andr pip package to PyPI.
#
# Triggered by pushing a tag like v0.1.0, v0.2.0, etc.
# Or manually via workflow_dispatch.
#
# Flow:
#   1. Spin up ROS 2 Humble container
#   2. Build andr_msgs with colcon (generates .so + Python bindings)
#   3. Sync bindings + base classes into pip package
#   4. Build wheel
#   5. Publish to PyPI

name: Release pip package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y python3-pip python3-colcon-common-extensions
          pip3 install build twine

      - name: Build andr_msgs
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --packages-select andr_msgs
        shell: bash

      - name: Sync bindings into pip package
        run: |
          PY_VERSION=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          MSGS_SRC="install/andr_msgs/local/lib/python${PY_VERSION}/dist-packages/andr_msgs"
          LIBS_SRC="install/andr_msgs/lib"

          # Sync andr_msgs Python bindings
          rm -rf pip/andr/andr/_msgs_bind/andr_msgs
          mkdir -p pip/andr/andr/_msgs_bind/andr_msgs
          cp -r ${MSGS_SRC}/* pip/andr/andr/_msgs_bind/andr_msgs/

          # Sync shared libraries
          rm -f pip/andr/andr/_libs/*.so
          mkdir -p pip/andr/andr/_libs
          cp ${LIBS_SRC}/libandr_msgs*.so pip/andr/andr/_libs/
          touch pip/andr/andr/_libs/__init__.py

          # Sync base classes
          cp andr_core/andr_tools/andr_tools/base_agent_tool.py pip/andr/andr/tools/
          cp andr_core/andr_tools/andr_tools/base_input_source.py pip/andr/andr/tools/
        shell: bash

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "__version__ = \"${VERSION}\"" > pip/andr/andr/_version.py
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pip/andr/pyproject.toml
        shell: bash

      - name: Build wheel
        run: |
          cd pip/andr
          python3 -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd pip/andr
          python3 -m twine upload dist/*
