site_name: ANDR
site_description: LLM agent framework for robotics, built on ROS 2
site_url: https://jaximus808.github.io/andr
repo_url: https://github.com/jaximus808/andr
repo_name: jaximus808/andr

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Your First Project: getting-started/first-project.md
  - Guides:
    - Custom Tools: guides/tools.md
    - Custom Input Sources: guides/inputs.md
    - Task Brain: guides/task-brain.md
    - Configuration: guides/configuration.md
  - Reference:
    - CLI: reference/cli.md
    - Architecture: reference/architecture.md
    - ROS 2 Interfaces: reference/ros-interfaces.md
  - Building from Source: from-source.md
